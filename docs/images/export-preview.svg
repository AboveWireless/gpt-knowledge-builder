<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="28" fill="#08111F"/>
  <rect x="24" y="24" width="912" height="492" rx="24" fill="#102138" stroke="#244162" stroke-width="2"/>
  <text x="56" y="88" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Clean GPT export flow</text>
  <text x="56" y="122" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="18">Lead with readiness, one big export button, and simple follow-through actions.</text>

  <rect x="56" y="156" width="848" height="146" rx="20" fill="#162843"/>
  <rect x="86" y="188" width="140" height="30" rx="10" fill="#203350" stroke="#45D7A3"/>
  <text x="116" y="208" fill="#45D7A3" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">READY</text>
  <text x="86" y="246" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Get GPT files</text>
  <text x="86" y="276" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="17">Create the final package, then open the folder or inspect the package index and provenance files.</text>
  <rect x="670" y="198" width="192" height="52" rx="14" fill="#4ED8FF"/>
  <text x="708" y="231" fill="#07121F" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Get GPT Files</text>

  <rect x="56" y="332" width="402" height="152" rx="18" fill="#162843"/>
  <rect x="502" y="332" width="402" height="152" rx="18" fill="#162843"/>
  <text x="82" y="370" fill="#4ED8FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">PACKAGE FILES</text>
  <text x="82" y="408" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">knowledge_core, glossary, procedures</text>
  <text x="82" y="440" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Clean upload set for the GPT itself.</text>

