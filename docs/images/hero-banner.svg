<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" rx="32" fill="#08111F"/>
  <rect x="24" y="24" width="1232" height="592" rx="28" fill="url(#panelGlow)" stroke="#244162" stroke-width="2"/>
  <rect x="64" y="72" width="500" height="496" rx="24" fill="#102138"/>
  <text x="96" y="150" fill="#4ED8FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">LOCAL-FIRST GPT WORKSPACE</text>
  <text x="96" y="220" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">GPT Knowledge Builder</text>
  <text x="96" y="278" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="26">
    <tspan x="96" dy="0">Pick folders, scan files, fix issues, and export</tspan>
    <tspan x="96" dy="34">clean GPT-ready knowledge packs without wrestling</tspan>
    <tspan x="96" dy="34">with raw project plumbing.</tspan>
  </text>

  <rect x="96" y="348" width="160" height="52" rx="14" fill="#4ED8FF"/>
  <text x="126" y="381" fill="#07121F" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Easy Start</text>
  <rect x="274" y="348" width="174" height="52" rx="14" fill="#172B45" stroke="#294263"/>
  <text x="301" y="381" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Advanced CLI</text>

  <rect x="96" y="438" width="380" height="92" rx="18" fill="#162843"/>
  <text x="122" y="474" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">For normal humans first</text>
  <text x="122" y="506" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="122" dy="0">One clear step at a time, roomy layouts,</tspan>
    <tspan x="122" dy="24">and plain labels that keep momentum high.</tspan>
  </text>

  <rect x="620" y="84" width="596" height="472" rx="26" fill="#0D182A" stroke="#1E3859"/>
  <rect x="652" y="118" width="532" height="116" rx="20" fill="#132238"/>
  <rect x="680" y="144" width="132" height="32" rx="11" fill="#203350" stroke="#4ED8FF"/>
  <text x="707" y="165" fill="#4ED8FF" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">DO THIS NOW</text>
  <text x="680" y="206" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Pick folders to start</text>
  <text x="680" y="194" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="680" dy="54">Choose the files to scan and where the GPT files should go.</tspan>
  </text>

  <rect x="652" y="264" width="252" height="116" rx="18" fill="#162843"/>
  <rect x="932" y="264" width="252" height="116" rx="18" fill="#162843"/>
  <rect x="652" y="406" width="532" height="116" rx="18" fill="#162843"/>

  <text x="678" y="302" fill="#45D7A3" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">WHAT HAPPENS NEXT</text>
  <text x="678" y="338" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Scan files</text>
  <text x="678" y="364" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="16">The app builds the working corpus.</text>

  <text x="958" y="302" fill="#FFCA6B" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">FIX ISSUES</text>
  <text x="958" y="338" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">One at a time</text>
  <text x="958" y="364" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Accept, skip, retry, next.</text>

  <text x="678" y="444" fill="#4ED8FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">GET GPT FILES</text>
  <text x="678" y="480" fill="#F1F5FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Clean package output</text>
  <text x="678" y="506" fill="#9CB0CF" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <tspan x="678" dy="0">Knowledge pages, package index, and optional provenance files</tspan>
    <tspan x="678" dy="22">without dumping the whole raw corpus into the final upload set.</tspan>
  </text>

  <defs>
    <linearGradient id="panelGlow" x1="48" y1="48" x2="1210" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10213A"/>
      <stop offset="1" stop-color="#09111F"/>
    </linearGradient>
  </defs>
</svg>
