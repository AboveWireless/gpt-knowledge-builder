name: Bug report
description: Report a reproducible problem in the desktop app, CLI, or packaging flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: Version
      description: App version or commit
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Windows app
        - GUI workflow
        - CLI
        - Packaging / installer
        - AI enrichment
        - OCR
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Load a project
        3. Run scan
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant errors or attach screenshots if available.
