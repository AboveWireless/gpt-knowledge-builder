name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build Windows release
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1

      - name: Compress app folder
        shell: powershell
        run: |
          $Version = python -c "from knowledge_builder.version import APP_VERSION; print(APP_VERSION)"
          Compress-Archive -Path ".\dist\GPT Knowledge Builder\*" -DestinationPath ".\dist\GPTKnowledgeBuilder-$Version-portable.zip" -Force

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            dist/installer/*.exe
            dist/*portable.zip
